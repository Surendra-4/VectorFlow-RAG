# render.yaml — Render Blueprint for the VectorFlow-RAG backend + database.
#
# Apply it from the Render dashboard:  New ▸ Blueprint ▸ connect this repo.
# Render reads this file, provisions a managed Postgres database and a Python
# web service, and wires DATABASE_URL between them automatically.
#
# The full step-by-step walkthrough (OAuth apps, Vercel, smoke test) lives in
# DEPLOYMENT.md. Everything here is env-driven — no code changes are required
# to go from local SQLite to hosted Postgres.

databases:
  - name: vectorflow-db
    databaseName: vectorflow
    user: vectorflow
    # `free` Postgres is fine to start (note Render expires free databases —
    # upgrade to a paid plan before relying on it). Only users + per-user stats
    # are stored here; ingested documents are never written to the database.
    plan: free
    # region: oregon          # uncomment + match your web service's region

services:
  - type: web
    name: vectorflow-api
    runtime: python
    # `standard` (2 GB RAM) is the smallest plan that reliably fits the local
    # embedding model (~1 GB resident). `free`/`starter` (512 MB) get OOM-killed
    # during "Initializing RAGPipeline" — see DEPLOYMENT.md › Sizing & cost.
    plan: free
    # region: oregon
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.api.app:create_app --factory --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    # Persists provider API keys (entered via the Settings UI) and the selected
    # chat model across restarts/redeploys. Without it you re-enter the key
    # after every deploy. Users + stats live in Postgres, not here.
    disk:
      name: vfr-state
      mountPath: /opt/render/project/src/var
      sizeGB: 1
    envVars:
      # ---- Runtime ------------------------------------------------------- #
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: VFR_LOGGING__FORMAT
        value: json
      # ---- Database (auto-wired from the managed Postgres above) ---------- #
      - key: DATABASE_URL
        fromDatabase:
          name: vectorflow-db
          property: connectionString
      # ---- Auth ---------------------------------------------------------- #
      - key: VFR_AUTH__REQUIRED
        value: "true"
      - key: VFR_AUTH__JWT_SECRET
        generateValue: true          # Render generates a strong random secret
      # These three are known once you have your final URLs. The backend URL is
      # predictable as https://<service-name>.onrender.com, so you can usually
      # fill them in at apply time; otherwise enter best-guesses and redeploy.
      - key: VFR_AUTH__PUBLIC_BASE_URL
        sync: false                  # e.g. https://vectorflow-api.onrender.com
      - key: VFR_AUTH__FRONTEND_URL
        sync: false                  # e.g. https://vectorflow.vercel.app
      - key: VFR_API__CORS_ORIGINS
        sync: false                  # e.g. ["https://vectorflow.vercel.app"]
      # ---- OAuth + VFR_SECRET_KEY ---------------------------------------- #
      # Optional. Add these in the dashboard when you enable Google/GitHub
      # sign-in (DEPLOYMENT.md › Enable social sign-in):
      #   VFR_AUTH__GOOGLE_CLIENT_ID, VFR_AUTH__GOOGLE_CLIENT_SECRET
      #   VFR_AUTH__GITHUB_CLIENT_ID, VFR_AUTH__GITHUB_CLIENT_SECRET
      #   VFR_SECRET_KEY  (Fernet key so provider API keys survive redeploys)
