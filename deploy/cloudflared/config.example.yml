# Cloudflare *named tunnel* config for the VectorFlow-RAG backend.
#
# Copy this to ~/.cloudflared/config.yml and edit the three REPLACE_ values.
# It tells cloudflared to publish your local FastAPI server at a stable public
# hostname. Full walkthrough: DEPLOYMENT.md › "Create the Cloudflare Tunnel".
#
# Quick reference (run these once, in order):
#   brew install cloudflared
#   cloudflared tunnel login                         # authorize your domain
#   cloudflared tunnel create vectorflow             # prints the tunnel UUID
#   cloudflared tunnel route dns vectorflow api.yourdomain.com
#   cloudflared tunnel run vectorflow                # start it (foreground)

# The tunnel's name (or its UUID). Must match the one you created above.
tunnel: vectorflow

# Absolute path to the credentials file `cloudflared tunnel create` wrote.
# It is named after the tunnel's UUID. Use YOUR home directory + UUID.
credentials-file: /Users/REPLACE_USER/.cloudflared/REPLACE_TUNNEL_UUID.json

# Ingress rules are evaluated top-to-bottom; the first match wins.
ingress:
  # Your public hostname  ->  the local backend (uvicorn on 127.0.0.1:8000).
  - hostname: api.yourdomain.com         # REPLACE with your real subdomain
    service: http://localhost:8000
  # Required catch-all: everything else returns 404.
  - service: http_status:404
